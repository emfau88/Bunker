<style>
:root{--bg:#151915;--panel:#232923;--line:#475147;--text:#eee8d3;--muted:#aeb6a6}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px system-ui,sans-serif}
header{position:sticky;top:0;z-index:3;padding:14px 18px;background:#151915ee;border-bottom:1px solid var(--line)}
h1{margin:0 0 4px;font-size:20px}p{margin:0;color:var(--muted)}
main{padding:18px}h2{margin:28px 0 12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px;min-height:190px}
.view{height:130px;display:grid;place-items:center;border-radius:7px;
background-color:#343a34;background-image:linear-gradient(45deg,#454b45 25%,transparent 25%),
linear-gradient(-45deg,#454b45 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#454b45 75%),
linear-gradient(-45deg,transparent 75%,#454b45 75%);background-size:20px 20px;
background-position:0 0,0 10px,10px -10px,-10px 0}
canvas{image-rendering:pixelated;max-width:100%;max-height:120px}
strong{display:block;margin-top:8px;overflow-wrap:anywhere}small{color:var(--muted)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}button{background:#2d362d;color:var(--text);

 const terrainRoot=document.querySelector("#terrain");
 terrain.tiles.forEach(t=>terrainRoot.append(card(t.name,{category:t.category,info:`Index ${t.index} · ${t.walkable?"begehbar":"blockiert"}`},c=>{
   c.width=64;c.height=64;c.getContext("2d").drawImage(terrainImage,(t.index%terrain.columns)*64,Math.floor(t.index/terrain.columns)*64,64,64,0,0,64,64);
 })));
 const objectRoot=document.querySelector("#objects");
 const categories=[...new Set(Object.values(atlas.bunker.objects).map(o=>o.category))].sort();
 const filters=document.querySelector("#filters");
 const all=document.createElement("button");all.textContent="Alle";all.className="active";filters.append(all);
 categories.forEach(cat=>{const b=document.createElement("button");b.textContent=cat;filters.append(b);});
 for(const [name,f] of Object.entries(atlas.frames)){
   const m=atlas.bunker.objects[name];objectRoot.append(card(name,{category:m.category,info:`${m.footprint.w}×${m.footprint.h} Felder · ${m.solid?"blockierend":"begehbar"}`},c=>{
     c.width=f.frame.w;c.height=f.frame.h;c.getContext("2d").drawImage(atlasImage,f.frame.x,f.frame.y,f.frame.w,f.frame.h,0,0,f.frame.w,f.frame.h);
   }));
 }
 filters.addEventListener("click",e=>{if(e.target.tagName!=="BUTTON")return;[...filters.children].forEach(b=>b.classList.remove("active"));e.target.classList.add("active");
 const wanted=e.target.textContent;document.querySelectorAll("#objects .card").forEach(el=>el.hidden=wanted!=="Alle"&&el.dataset.category!==wanted);});
});
</script></body></html>
